{% extends "base.html" %}
{% block content %}

<div class="mb-4">
    <h2 class="mb-0"><i class="bi bi-pencil-square me-2"></i>编辑投票选项</h2>
    <p class="text-muted mb-0" style="font-size:0.85rem;letter-spacing:1px;">EDIT VOTE OPTION</p>
</div>

<div class="settings-card">
    <div class="settings-card__header">
        <i class="bi bi-hand-thumbs-up me-2"></i>选项详情
    </div>
    <div class="settings-card__body">
        <form method="post">
            <div class="row g-3">
                <div class="col-12">
                    <label class="field-label">标题</label>
                    <input type="text" name="title" class="form-control form-control-sm"
                           value="{{ option.title }}" required>
                </div>
                <div class="col-12">
                    <label class="field-label">描述（可选）</label>
                    <textarea name="description" class="form-control form-control-sm" rows="3"
                              style="resize:vertical;">{{ option.description }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="field-label">开始日期</label>
                    <input type="date" name="start_date" class="form-control form-control-sm"
                           value="{{ option.start_date.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="field-label">结束日期</label>
                    <input type="date" name="end_date" class="form-control form-control-sm"
                           value="{{ option.end_date.strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-12 d-flex justify-content-end gap-2">
                    <a href="{{ url_for('admin_vote') }}" class="btn btn-sm btn-outline-secondary px-3">
                        <i class="bi bi-arrow-left me-1"></i>取消
                    </a>
                    <button type="submit" class="btn btn-sm btn-primary px-4">
                        <i class="bi bi-check2 me-1"></i>保存
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
