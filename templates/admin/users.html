{% extends "base.html" %}
{% block content %}

<h2><i class="bi bi-people me-2"></i>用户名单</h2>

<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span>共 <strong>{{ users | length }}</strong> 名用户</span>
    </div>
    <div class="table-responsive">
        <table class="table table-sm mb-0" style="color:var(--text-main);">
            <thead>
                <tr style="font-size:0.78rem;color:var(--text-muted);border-bottom:1px solid var(--border);">
                    <th style="width:50px;">#</th>
                    <th>用户名</th>
                    <th style="width:80px;">角色</th>
                    <th style="width:170px;">注册时间</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr style="border-bottom:1px solid var(--border);">
                    <td style="font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--text-muted);">{{ loop.index }}</td>
                    <td style="font-weight:600;">{{ u.username }}</td>
                    <td>
                        {% if u.is_admin %}
                        <span class="badge" style="background:rgba(255,170,0,0.15);color:var(--gold);">管理员</span>
                        {% else %}
                        <span class="badge" style="background:rgba(0,220,255,0.1);color:var(--cyan);">用户</span>
                        {% endif %}
                    </td>
                    <td style="font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--text-muted);">
                        {{ u.created_at.strftime('%Y-%m-%d %H:%M') }}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="mt-3">
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>返回首页
    </a>
</div>

{% endblock %}
