{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="font-size:3rem;line-height:1;">🎵</div>
            <h2 class="mt-2">用户登录</h2>
            <p class="text-muted" style="font-size:0.8rem;letter-spacing:2px;">PLAYER LOGIN</p>
        </div>
        <div class="card p-4">
            <form method="post">
                <div class="mb-4">
                    <label>用户名</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:rgba(0,220,255,0.07);border:1px solid var(--border);border-right:none;color:var(--text-muted);">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" name="username" class="form-control" placeholder="输入用户名" required style="border-left:none;">
                    </div>
                </div>
                <div class="mb-4">
                    <label>密码</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:rgba(0,220,255,0.07);border:1px solid var(--border);border-right:none;color:var(--text-muted);">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control" placeholder="输入密码" required style="border-left:none;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>登录
                </button>
                <hr>
                <div class="text-center">
                    <a href="{{ url_for('register') }}" class="text-muted" style="font-size:0.85rem;">
                        没有账号？<span style="color:var(--cyan);">立即注册</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
